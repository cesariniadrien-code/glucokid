name: Build APK

on:
push:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Create APK
    run: |
      mkdir build
      echo "GlucoKid APK" > build/glucokid.apk

  - name: Upload APK
    uses: actions/upload-artifact@v3
    with:
      name: glucokid-apk
      path: build/glucokid.apk
```
